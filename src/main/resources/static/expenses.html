<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Expenses — AI Expense Tracker</title>
  <link rel="stylesheet" href="/style.css"/>
</head>
<body>
<button class="hamburger" id="hamburger" onclick="toggleSidebar()" aria-label="Menu">☰</button>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo"><div class="logo-icon">💰</div><div class="logo-text">AI <span>Expense</span><br/>Tracker</div></div>
  <div class="nav-section">
    <div class="nav-label">Main</div>
    <a class="nav-item" href="/dashboard.html"><span class="nav-icon">📊</span> Dashboard</a>
    <a class="nav-item active" href="/expenses.html"><span class="nav-icon">💳</span> Expenses</a>
    <a class="nav-item" href="/budget.html"><span class="nav-icon">🎯</span> Budget</a>
    <a class="nav-item" href="/analytics.html"><span class="nav-icon">📈</span> Analytics</a>
  </div>
  <div class="nav-section">
    <div class="nav-label">Account</div>
    <a class="nav-item" href="/profile.html"><span class="nav-icon">👤</span> Profile</a>
  </div>
  <div class="sidebar-footer">
    <div class="user-chip">
      <div class="user-avatar" id="sidebar-avatar">👤</div>
      <div class="user-info"><div class="user-name" id="sidebar-name">User</div><div class="user-email" id="sidebar-email">—</div></div>
      <button class="logout-btn" onclick="logout()">⏻</button>
    </div>
  </div>
</aside>
<main class="main">
  <div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px">
    <div><h1>💳 Expenses</h1><p>Track and manage all your spending</p></div>
    <button class="btn btn-primary" onclick="openModal()">+ Add Expense</button>
  </div>
  <div class="card" style="margin-bottom:20px;padding:16px 20px">
    <div class="filter-row" style="display:flex;gap:16px;align-items:center;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:8px">
        <label style="font-size:0.82rem;color:var(--muted)">Month</label>
        <select id="filter-month" onchange="loadExpenses()" style="padding:7px 12px;background:#1a1928;border:1px solid var(--border);border-radius:8px;color:#fffffe;font-family:Inter,sans-serif;font-size:0.85rem;outline:none">
          <option value="">All</option>
          <option value="1">January</option><option value="2">February</option><option value="3">March</option>
          <option value="4">April</option><option value="5">May</option><option value="6">June</option>
          <option value="7">July</option><option value="8">August</option><option value="9">September</option>
          <option value="10">October</option><option value="11">November</option><option value="12">December</option>
        </select>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <label style="font-size:0.82rem;color:var(--muted)">Year</label>
        <select id="filter-year" onchange="loadExpenses()" style="padding:7px 12px;background:#1a1928;border:1px solid var(--border);border-radius:8px;color:#fffffe;font-family:Inter,sans-serif;font-size:0.85rem;outline:none">
          <option value="2025">2025</option><option value="2026" selected>2026</option>
        </select>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <label style="font-size:0.82rem;color:var(--muted)">Category</label>
        <select id="filter-cat" onchange="filterByCategory()" style="padding:7px 12px;background:#1a1928;border:1px solid var(--border);border-radius:8px;color:#fffffe;font-family:Inter,sans-serif;font-size:0.85rem;outline:none">
          <option value="">All</option><option>Food</option><option>Dining</option><option>Transport</option>
          <option>Shopping</option><option>Health</option><option>Utilities</option><option>Entertainment</option><option>Other</option>
        </select>
      </div>
      <div style="margin-left:auto;font-size:0.85rem;color:var(--muted)">
        Total: <strong id="filter-total" style="color:var(--text)">₹0</strong> &nbsp;|&nbsp;
        <strong id="filter-count" style="color:var(--text)">0</strong> transactions
      </div>
    </div>
  </div>
  <div class="card">
    <div class="table-wrap">
      <table>
        <thead><tr><th>Title</th><th>Category</th><th>Date</th><th>Description</th><th style="text-align:right">Amount</th><th style="text-align:center">Actions</th></tr></thead>
        <tbody id="expense-tbody"><tr><td colspan="6"><div class="empty-state"><div class="empty-icon">⏳</div><p>Loading...</p></div></td></tr></tbody>
      </table>
    </div>
  </div>
</main>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modal-title">Add New Expense</div>
    <input type="hidden" id="edit-id"/>
    <div class="form-row">
      <div class="form-group"><label>Title *</label><input type="text" id="f-title" placeholder="e.g. Lunch"/></div>
      <div class="form-group"><label>Amount (₹) *</label><input type="number" id="f-amount" placeholder="0.00" step="0.01" min="0.01"/></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Category</label>
        <select id="f-category"><option>Food</option><option>Dining</option><option>Transport</option><option>Shopping</option><option>Health</option><option>Utilities</option><option>Entertainment</option><option>Other</option></select>
      </div>
      <div class="form-group"><label>Date</label><input type="date" id="f-date"/></div>
    </div>
    <div class="form-group"><label>Description</label><input type="text" id="f-description" placeholder="Optional note"/></div>
    <div style="display:flex;gap:10px;margin-top:4px">
      <button class="btn btn-ghost" style="flex:1" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" style="flex:2" onclick="saveExpense()">💾 Save Expense</button>
    </div>
  </div>
</div>

<!-- DELETE MODAL -->
<div class="modal-overlay" id="delete-overlay">
  <div class="modal" style="max-width:360px;text-align:center">
    <div style="font-size:40px;margin-bottom:16px">🗑️</div>
    <div class="modal-title">Delete Expense?</div>
    <p style="color:var(--muted);font-size:0.875rem;margin-bottom:24px">This cannot be undone.</p>
    <div style="display:flex;gap:10px">
      <button class="btn btn-ghost" style="flex:1" onclick="document.getElementById('delete-overlay').classList.remove('open')">Cancel</button>
      <button class="btn btn-danger" style="flex:1" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="/app.js"></script>
<script>
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

let allExpenses = [], deleteId = null;
document.addEventListener('DOMContentLoaded', () => {
  initSidebar();
  document.getElementById('filter-month').value = currentMonth();
  document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
  loadExpenses();
});
async function loadExpenses() {
  const m = document.getElementById('filter-month').value;
  const y = document.getElementById('filter-year').value;
  const tbody = document.getElementById('expense-tbody');
  tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">⏳</div><p>Loading...</p></div></td></tr>';
  try {
    let url = m && y ? `/expenses/monthly?userId=${session.userId}&month=${m}&year=${y}` : `/expenses?userId=${session.userId}`;
    allExpenses = await apiFetch(url) || [];
    renderTable(allExpenses);
  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">⚠️</div><p>${e.message}</p></div></td></tr>`;
  }
}
function filterByCategory() {
  const cat = document.getElementById('filter-cat').value;
  renderTable(cat ? allExpenses.filter(e => e.category === cat) : allExpenses);
}
function renderTable(expenses) {
  const tbody = document.getElementById('expense-tbody');
  const total = expenses.reduce((s,e) => s + Number(e.amount), 0);
  document.getElementById('filter-total').textContent = fmtCurrency(total);
  document.getElementById('filter-count').textContent = expenses.length;
  if (!expenses.length) { tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">📭</div><p>No expenses found.</p></div></td></tr>'; return; }
  tbody.innerHTML = expenses.map(e => `
    <tr>
      <td><strong>${e.title}</strong></td>
      <td>${categoryBadge(e.category)}</td>
      <td style="color:var(--muted)">${fmtDate(e.expenseDate)}</td>
      <td style="color:var(--muted);font-size:0.82rem">${e.description||'—'}</td>
      <td style="text-align:right"><span class="amount debit">${fmtCurrency(e.amount)}</span></td>
      <td style="text-align:center">
        <div style="display:flex;gap:6px;justify-content:center">
          <button class="btn btn-ghost btn-icon btn-sm" onclick="editExpense('${e.id}')">✏️</button>
          <button class="btn btn-danger btn-icon btn-sm" onclick="askDelete('${e.id}')">🗑️</button>
        </div>
      </td>
    </tr>`).join('');
}
function openModal(exp=null) {
  document.getElementById('modal-title').textContent = exp ? 'Edit Expense' : 'Add New Expense';
  document.getElementById('edit-id').value = exp?.id||'';
  document.getElementById('f-title').value = exp?.title||'';
  document.getElementById('f-amount').value = exp?.amount||'';
  document.getElementById('f-category').value = exp?.category||'Food';
  document.getElementById('f-date').value = exp?.expenseDate||new Date().toISOString().split('T')[0];
  document.getElementById('f-description').value = exp?.description||'';
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function editExpense(id) { openModal(allExpenses.find(x=>x.id===id)); }
async function saveExpense() {
  const id = document.getElementById('edit-id').value;
  const body = { title: document.getElementById('f-title').value.trim(), amount: parseFloat(document.getElementById('f-amount').value), category: document.getElementById('f-category').value, expenseDate: document.getElementById('f-date').value, description: document.getElementById('f-description').value.trim() };
  if (!body.title||!body.amount) { showToast('Title and amount required','error'); return; }
  try {
    if (id) await apiFetch(`/expenses/${id}?userId=${session.userId}`, {method:'PATCH',body:JSON.stringify(body)});
    else await apiFetch(`/expenses?userId=${session.userId}`, {method:'POST',body:JSON.stringify(body)});
    showToast(id ? 'Expense updated!' : 'Expense added!');
    closeModal(); loadExpenses();
  } catch(e) { showToast(e.message,'error'); }
}
function askDelete(id) { deleteId=id; document.getElementById('delete-overlay').classList.add('open'); }
async function confirmDelete() {
  try {
    await apiFetch(`/expenses/${deleteId}?userId=${session.userId}`,{method:'DELETE'});
    showToast('Expense deleted!'); document.getElementById('delete-overlay').classList.remove('open'); loadExpenses();
  } catch(e) { showToast(e.message,'error'); }
}
</script>
</body>
</html>
